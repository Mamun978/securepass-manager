services:
  - type: web
    name: securepass-manager-backend
    env: docker
    rootDir: backend
    plan: free
    healthCheckPath: /actuator/health
    envVars:
      - key: DB_URL
        sync: false
      - key: DB_USERNAME
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: AES_KEY
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: JPA_DDL_AUTO
        value: update
